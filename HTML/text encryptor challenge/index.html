<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encriptador</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-alura">
                <img src="./assets/logo.png" alt="logo alura">
            </div>
        </header>
        <div class="main-container">
            <div class="left-column">
                <textarea placeholder="Ingrese el texto aquí"></textarea>
            </div>
            <div class="right-column">
                <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Orci montes, sit et diam risus scelerisque vitae est. Tortor maecenas nunc ut laoreet. Eget diam mauris quam quisque ut eget fringilla sit elit. Libero, sodales duis fames id diam feugiat aliquet non egestas.</p>
                <button class="btn tertiary">Copiar</button>
            </div>
        </div>
        <footer>
            <p class="info"><i class='bx bxs-check-circle'></i> Letras minúsculas y sin tildes</p>
            <div class="buttons">
                <button class="btn primary">Encriptar</button>
                <button class="btn secondary">Desencriptar</button>
            </div>
        </footer>
    </div>
</body>
</html>
